name: Publish Package Registries

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24

            - name: Determine publish eligibility
              id: gate
              shell: bash
              run: |
                  set -euo pipefail

                  normalize_version() {
                    echo "${1#v}" | cut -d'-' -f1
                  }

                  version_gt() {
                    local left
                    local right
                    left="$(normalize_version "$1")"
                    right="$(normalize_version "$2")"
                    [[ "$left" != "$right" && "$(printf '%s\n%s\n' "$left" "$right" | sort -V | tail -n 1)" == "$left" ]]
                  }

                  PACKAGE_NAME=$(node -p "require('./package.json').name")
                  CURRENT_VERSION=$(node -p "require('./package.json').version")
                  BEFORE_SHA="${{ github.event.before }}"

                  VERSION_CHANGED="false"
                  VERSION_BUMPED="false"

                  if [[ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "$BEFORE_SHA" 2>/dev/null; then
                    if git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" | grep -q '^package.json$'; then
                      PREVIOUS_VERSION=$(git show "$BEFORE_SHA:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
                      if [[ "$PREVIOUS_VERSION" != "$CURRENT_VERSION" ]]; then
                        VERSION_CHANGED="true"
                        if version_gt "$CURRENT_VERSION" "$PREVIOUS_VERSION"; then
                          VERSION_BUMPED="true"
                        fi
                      fi
                    fi
                  fi

                  GITHUB_PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version --registry https://npm.pkg.github.com 2>/dev/null || echo "0.0.0")

                  NEWER_THAN_GITHUB="false"
                  if version_gt "$CURRENT_VERSION" "$GITHUB_PUBLISHED_VERSION"; then
                    NEWER_THAN_GITHUB="true"
                  fi

                  SHOULD_PUBLISH_GITHUB="false"

                  if [[ "$VERSION_CHANGED" == "true" && "$VERSION_BUMPED" == "true" && "$NEWER_THAN_GITHUB" == "true" ]]; then
                    SHOULD_PUBLISH_GITHUB="true"
                  fi

                  SHOULD_INSTALL="$SHOULD_PUBLISH_GITHUB"

                  echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
                  echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
                  echo "github_published_version=$GITHUB_PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
                  echo "version_changed=$VERSION_CHANGED" >> "$GITHUB_OUTPUT"
                  echo "version_bumped=$VERSION_BUMPED" >> "$GITHUB_OUTPUT"
                  echo "newer_than_github=$NEWER_THAN_GITHUB" >> "$GITHUB_OUTPUT"
                  echo "should_publish_github=$SHOULD_PUBLISH_GITHUB" >> "$GITHUB_OUTPUT"
                  echo "should_install=$SHOULD_INSTALL" >> "$GITHUB_OUTPUT"

            - name: Install dependencies
              if: steps.gate.outputs.should_install == 'true'
              run: npm ci --ignore-scripts

            - name: Publish to GitHub Packages
              if: steps.gate.outputs.should_publish_github == 'true'
              run: npm publish --registry https://npm.pkg.github.com
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Publish decision summary
              run: |
                  echo "package: ${{ steps.gate.outputs.package_name }}"
                  echo "current_version: ${{ steps.gate.outputs.current_version }}"
                  echo "github_published_version: ${{ steps.gate.outputs.github_published_version }}"
                  echo "version_changed_in_push: ${{ steps.gate.outputs.version_changed }}"
                  echo "version_bumped_in_push: ${{ steps.gate.outputs.version_bumped }}"
                  echo "newer_than_github: ${{ steps.gate.outputs.newer_than_github }}"
                  echo "should_publish_github: ${{ steps.gate.outputs.should_publish_github }}"
